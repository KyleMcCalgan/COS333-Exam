const questions = [{"number": 1, "interactive": true, "prompt": "Consider the following Prolog proposition implementation:\n\ntail([], []).\n\ntail([H|T], T).\n\nThe tail proposition succeeds if the second parameter is the tail of the first parameter, where the proposition assumes that the tail of an empty list is an empty list. This implementation results in a Prolog interpreter raising a warning. Consider the following statements about the tail proposition, and select the one that is most correct.", "promptBlocks": ["Consider the following Prolog proposition implementation:", "tail([], []).", "tail([H|T], T).", "The tail proposition succeeds if the second parameter is the tail of the first parameter, where the proposition assumes that the tail of an empty list is an empty list. This implementation results in a Prolog interpreter raising a warning. Consider the following statements about the tail proposition, and select the one that is most correct."], "options": ["The warning can be avoided by replacing H with an _ character, although the tail proposition will not work correctly for certain queries.", "The warning can be avoided by replacing H with an _ character, although the tail proposition will be less efficient than the original implementation provided above.", "The warning can be avoided by replacing H with an _ character, although the tail proposition will be less reliable than the original implementation provided above.", "The warning can be avoided without changing how the tail proposition works by replacing H with an _ character."], "answers": [4], "reason": "The anonymous variable _ removes the unused-variable warning without changing the tail rule's behavior.", "shortAnswer": "No model answer has been added for this question yet.", "isCodeQuestion": false}, {"number": 2, "interactive": true, "prompt": "Consider the following Prolog proposition implementation:\n\nprimeGreaterThanOneMillion(X) :- prime(X), X > 1000000.\n\nAssume that the proposition prime(X) succeeds if X is a prime number. Consider the following statements about the primeGreaterThanOneMillion proposition, and select the one that is most correct.\n\nThe primeGreaterThanOneMillion proposition will execute more efficiently if it is rewritten as:\n\nprimeGreaterThanOneMillion(X) :- X > 1000000, prime(X).\n\nThe primeGreaterThanOneMillion proposition will execute less efficiently if it is rewritten as:", "promptBlocks": ["Consider the following Prolog proposition implementation:", "primeGreaterThanOneMillion(X) :- prime(X), X > 1000000.", "Assume that the proposition prime(X) succeeds if X is a prime number. Consider the following statements about the primeGreaterThanOneMillion proposition, and select the one that is most correct.", "The primeGreaterThanOneMillion proposition will execute more efficiently if it is rewritten as:", "primeGreaterThanOneMillion(X) :- X > 1000000, prime(X).", "The primeGreaterThanOneMillion proposition will execute less efficiently if it is rewritten as:"], "options": ["The primeGreaterThanOneMillion proposition will execute more efficiently if it is rewritten as: primeGreaterThanOneMillion(X) :- X > 1000000, prime(X).", "The primeGreaterThanOneMillion proposition will execute less efficiently if it is rewritten as: primeGreaterThanOneMillion(X) :- X > 1000000, prime(X).", "The primeGreaterThanOneMillion proposition will not work correctly unless it is rewritten as: primeGreaterThanOneMillion(X) :- X > 1000000, prime(X).", "The primeGreaterThanOneMillion proposition cannot be successfully implemented, due to a deficiency of Prolog."], "answers": [1], "reason": "When X is already instantiated, testing X > 1000000 before calling prime can avoid unnecessary primality work.", "shortAnswer": "No model answer has been added for this question yet.", "isCodeQuestion": false}, {"number": 3, "interactive": true, "prompt": "Assume that you wish to write a Prolog proposition that ensures that two variables, X and Y , do not represent the same thing. Consider the following statements, and select the one that describes the most rigorous and correct way to achieve this.", "promptBlocks": ["Assume that you wish to write a Prolog proposition that ensures that two variables, X and Y , do not represent the same thing. Consider the following statements, and select the one that describes the most rigorous and correct way to achieve this."], "options": ["X and Y are always different because X and Y represent two distinct atoms.", "X and Y are always different because X and Y represent two distinct variables.", "By defining a proposition called unequal(X, Y) for every pair of atoms that are not the same.", "By using the proposition not(X = Y) ."], "answers": [4], "reason": "not(X = Y) succeeds exactly when X and Y cannot be unified as the same value.", "shortAnswer": "No model answer has been added for this question yet.", "isCodeQuestion": false}, {"number": 4, "interactive": false, "prompt": "Assume you have Prolog facts describing family relationships, taking the following form:\n\nfather(bill, jake).\n\nfather(bill, shelley).\n\nfather(jake, ted).\n\nfather(ron, liz).\n\nmother(mary, jake).\n\nmother(mary, shelley).\n\nmother(janet, ted).\n\nmother(shelley, liz).\n\nNote that the only facts you are allowed to define are the father and mother propositions. If you define any facts using additional propositions, you will forfeit all marks for this question . The proposition father(X, Y) means that person X is the father of person Y , and mother(X, Y) means that person X is the mother of person Y . Note that it is possible for single parents to exist (i.e. a person may have only a mother or only a father). Same sex parents are also possible (i.e. a person may have two mothers or two fathers).\n\nWrite a Prolog proposition called nephewNiece(X, Y) , which succeeds if person X is the nephew or niece of person Y . A person's nephew or niece is the son or daughter, respectively, of that person's brother or sister. In the above example, shelley is the sister of jake because shelley and jake share at least one parent (in this example, bill or mary ). This means that ted is the nephew of shelley , because ted is the son of jake . Similarly, liz is the niece of jake , because liz is the son of shelley .\n\nHint: When testing your proposition, use variables, such as in the query nephewNiece(X, Y) , then use Prolog\u2019s support for re-querying to determine all the pairs of atoms that satisfy the nephewNiece proposition, and ensure that the proposition does not succeed for atoms that do not satisfy the properties of nephews and nieces.\n\nSubmit your program code in a file named u99999999.pl (where 99999999 is your student number) to the assignment submission slot labelled \"Semester Test 2: Simple Prolog Proposition\", and select the \"True\" answer below once you have done so. If you do not make a submission, select the \"False\" answer below.\n\nTake careful note of the following requirements:\n\nYour submission must be working Prolog code that will be successfully interpreted by the SWI-Prolog interpreter installed on the Windows computers in the Informatorium. You may (and should) use this SWI- Prolog interpreter to test your submission. For notes on using the interpreter, and re-querying, see the specification for Practical 3. Once you have finished writing your program, save it in a text file with the appropriate name, and submit it to the correct upload slot.\n\nYou may define additional helper propositions.\n\nNote that you may only use the simple constants, variables, list manipulation methods, arithmetic and relational expressions, the is operator, cuts, and the built-in not proposition discussed in the textbook and slides . In particular, do not use if-then, if-then-else, and similar constructs. Also, do not use the logical and operator (represented using a semicolon symbol). You may NOT use any more complex predicates provided by the Prolog system itself (including the built-in member , append , and reverse\n\npropositions). In other words, you must write all your own propositions, other than not . Failure to observe this rule will result in all marks for this question being forfeited .\n\nTrue\n\nFalse", "promptBlocks": ["Assume you have Prolog facts describing family relationships, taking the following form:", "father(bill, jake).", "father(bill, shelley).", "father(jake, ted).", "father(ron, liz).", "mother(mary, jake).", "mother(mary, shelley).", "mother(janet, ted).", "mother(shelley, liz).", "Note that the only facts you are allowed to define are the father and mother propositions. If you define any facts using additional propositions, you will forfeit all marks for this question . The proposition father(X, Y) means that person X is the father of person Y , and mother(X, Y) means that person X is the mother of person Y . Note that it is possible for single parents to exist (i.e. a person may have only a mother or only a father). Same sex parents are also possible (i.e. a person may have two mothers or two fathers).", "Write a Prolog proposition called nephewNiece(X, Y) , which succeeds if person X is the nephew or niece of person Y . A person's nephew or niece is the son or daughter, respectively, of that person's brother or sister. In the above example, shelley is the sister of jake because shelley and jake share at least one parent (in this example, bill or mary ). This means that ted is the nephew of shelley , because ted is the son of jake . Similarly, liz is the niece of jake , because liz is the son of shelley .", "Hint: When testing your proposition, use variables, such as in the query nephewNiece(X, Y) , then use Prolog\u2019s support for re-querying to determine all the pairs of atoms that satisfy the nephewNiece proposition, and ensure that the proposition does not succeed for atoms that do not satisfy the properties of nephews and nieces.", "Submit your program code in a file named u99999999.pl (where 999999  getAbsNonZeros proposition succeeds if L2 contains the absolute values of only the non-zero elements contained in L1 , in their original order (zero values contained in L1 are not included in L2 ). For example, the query:\n\n?- getAbsNonZeros([0], X).\n\nshould be true with the instantiation X = [] . This is because there are no non-zero values in the list [0] . Similarly, the query\n\n?- getAbsNonZeros([1, 0, -2, 0], X).\n\nshould be true with the instantiation X = [1, 2] . This is because the absolute values of 1 and -2 are 1 and 2, respectively, while the second and fourth elements are zero values, and are therefore not included in X .\n\nSubmit your program code in a file named u99999999.pl (where 99999999 is your student number) to the assignment submission slot labelled \"Semester Test 2: List Processing Prolog Proposition\", and select the \"True\" answer below once you have done so. If you do not make a submission, select the \"False\" answer below.\n\nTake careful note of the following requirements:\n\nYour submission must be working Prolog code that will be successfully interpreted by the SWI-Prolog interpreter installed on the Windows computers in the Informatorium. You may (and should) use this SWI- Prolog interpreter to test your submission. For notes on using the interpreter, and re-querying, see the specification for Practical 3. Once you have finished writing your program, save it in a text file with the appropriate name, and submit it to the correct upload slot.\n\nYou may define additional helper propositions.\n\nNote that you may only use the simple constants, variables, list manipulation methods, arithmetic and relational expressions, the is operator, cuts, and the built-in not proposition discussed in the textbook and slides . In particular, do not use if-then, if-then-else, and similar constructs. Also, do not use the logical and operator (represented using a semicolon symbol). You may NOT use any more complex predicates provided by the Prolog system itself (including the built-in member , append , and reverse\n\npropositions). In other words, you must write all your own propositions, other than not . Failure to observe this rule will result in all marks for this question being forfeited .\n\nTrue\n\nFalse", "promptBlocks": ["Write a Prolog proposition called getAbsNonZeros(L1, L2) , where L1 and L2 are both simple numeric lists (i.e. lists containing only integers). The getAbsNonZeros proposition succeeds if L2 contains the absolute values of only the non-zero elements contained in L1 , in their original order (zero values contained in L1 are not included in L2 ). For example, the query:", "?- getAbsNonZeros([0], X).", "should be true with the instantiation X = [] . This is because there are no non-zero values in the list [0] . Similarly, the query", "?- getAbsNonZeros([1, 0, -2, 0], X).", "should be true with the instantiation X = [1, 2] . This is because the absolute values of 1 and -2 are 1 and 2, respectively, while the second and fourth elements are zero values, and are therefore not included in X .", "Submit your program code in a file named u99999999.pl (where 99999999 is your student number) to the assignment submission slot labelled \"Semester Test 2: List Processing Prolog Proposition\", and select the \"True\" answer below once you have done so. If you do not make a submission, select the \"False\" answer below.", "Take careful note of the following requirements:", "Your submission must be working Prolog code that will be successfully interpreted by the SWI-Prolog interpreter installed on the Windows computers in the Informatorium. You may (and should) use this SWI- Prolog interpreter to test your submission. For notes on using the interpreter, and re-querying, see the specification for Practical 3. Once you have finished writing your program, save it in a text file with the appropriate name, and submit it to the correct upload slot.", "You may define additional helper propositions.", "Note that you may only use the simple constants, variables, list manipulation methods, arithmetic and relational expressions, the is operator, cuts, and the built-in not proposition discussed in the textbook and slides . In particular, do not use if-then, if-then-else, and similar constructs. Also, do not use the logical and operator (represented using a semicolon symbol). You may NOT use any more complex predicates provided by the Prolog system itself (including the built-in member , append , and reverse", "propositions). In other words, you must write all your own propositions, other than not . Failure to observe this rule will result in all marks for this question being forfeited .", "True", "False"], "options": [], "answers": [], "reason": "", "shortAnswer": "getAbsNonZeros([], []).\ngetAbsNonZeros([0|T], R) :- getAbsNonZeros(T, R).\ngetAbsNonZeros([H|T], [H|R]) :- H > 0, getAbsNonZeros(T, R).\ngetAbsNonZeros([H|T], [A|R]) :- H < 0, A is 0 - H, getAbsNonZeros(T, R).", "isCodeQuestion": true}, {"number": 6, "interactive": true, "prompt": "Consider the following programming languages, and select the one that is the least reliable in terms of name length.", "promptBlocks": ["Consider the following programming languages, and select the one that is the least reliable in terms of name length."], "options": ["Fortran", "C99", "C++", "C#"], "answers": [1], "reason": "Early Fortran name-length and naming restrictions make it the least reliable option here.", "shortAnswer": "No model answer has been added for this question yet.", "isCodeQuestion": false}, {"number": 7, "interactive": true, "prompt": "Consider the following statements about variable names in Perl and Java, and select the one that is the most correct.", "promptBlocks": ["Consider the following statements about variable names in Perl and Java, and select the one that is the most correct."], "options": ["Variable names in Perl have a higher cost of maintenance than variable names in Java.", "Variable names in Perl , "isCodeQuestion": false}, {"number": 10, "interactive": true, "prompt": "Consider the following program code in a hypothetical programming language:\n\nf() {\n\nmyValue = 10\n\nprint(myValue)\n\nmyValue = myValue + 5\n\n}\n\nmain() {\n\nf()\n\nf()\n\nf()\n\n}\n\nAssume that program execution starts with the main subprogram, and that the output of the program is:\n\n10 15 20\n\nConsider the following options, and select the one that correctly describes the category of the variable myValue , according to lifetime.", "promptBlocks": ["Consider the following program code in a hypothetical programming language:", "f() {", "myValue = 10", "print(myValue)", "myValue = myValue + 5", "}", "main() {", "f()", "f()", "f()", "}", "Assume that program execution starts with the main subprogram, and that the output of the program is:", "10 15 20", "Consider the following options, and select the one that correctly describes the category of the variable myValue , according to lifetime."], "options": ["Static variable.", "Stack-dynamic variable.", "Explicit heap-dynamic variable.", "Implicit heap-dynamic variable."], "answers": [1], "reason": "The value persists across calls, so myValue has static lifetime.", "shortAnswer": "No model answer has been added for this question yet.", "isCodeQuestion": false}, {"number": 11, "interactive": true, "prompt": "Assume a hypothetical programming language uses dynamic type binding. Consider the following options, and select the one that most correctly describes the category of the variables in this programming language, according to lifetime.", "promptBlocks": ["Assume a hypothetical programming language uses dynamic type binding. Consider the following options, and select the one that most correctly describes the category of the variables in this programming language, according to lifetime."], "options": ["Static variables.", "Stack-dynamic variables.", "Explicit heap-dynamic variables.", "Implicit heap-dynamic variables."], "answers": [4], "r  "isCodeQuestion": false}, {"number": 13, "interactive": false, "prompt": "Consider the following program code in a hypothetical programming language (line numbers are provided only for reference purposes):\n\nvoid f() allocateInteger(myValue, 15) print(myValue)\n\nint main() f() return 0\n\nAssume that the programming language uses static scope, that variables are not explicitly declared, that the main subprogram is the first thing to be executed when the program runs, and that indentation indicates the body of subprograms. Fill in the start and end of the lifetime of the variable myValue, using only line numbers (do not include full stops or other punctuation).\n\nLifetime of myValue: From\n\nup to and including", "promptBlocks": ["Consider the following program code in a hypothetical programming language (line numbers are provided only for reference purposes):", "void f() allocateInteger(myValue, 15) print(myValue)", "int main() f() return 0", "Assume that the programming language uses static scope, that variables are not explicitly declared, that the main subprogram is the first thing to be executed when the program runs, and that indentation indicates the body of subprograms. Fill in the start and end of the lifetime of the variable myValue, using only line numbers (do not include full stops or other punctuation).", "Lifetime of myValue: From", "up to and including"], "options": [], "answers": [], "reason": "", "shortAnswer": "Lifetime of myValue: from line 2 up to and including the point where the allocated integer is deallocated. No deallocation is shown, so it continues after line 3 and becomes leaked/inaccessible after f returns.", "isCodeQuestion": false}, {"number": 14, "interactive": false, "prompt": "Identify the kind of named constants that are used in C++.", "promptBlocks": ["Identify the kind of named constants that are used in C++."], "options": [], "answers": [], "reason": "", "shortAnswer": "C++ supports both manifest constants, such as const valu const quiz = document.getElementById('quiz');

function escapeHtml(value) {
  return value.replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
}

function looksLikeCode(value) {
  return /(^|\s)(:-|\?-|\[[^\]]*\]|\w+\([^)]*\)|void |int |var |class |main\(|father\(|mother\(|tenant\(|address\(|print\(|return |call )/.test(value);
}

function renderPrompt(blocks) {
  return blocks.map(block => {
    const escaped = escapeHtml(block);
    return looksLikeCode(block) ? `<pre>${escaped}</pre>` : `<p>${escaped}</p>`;
  }).join('');
}

function renderAnswer(value) {
  const escaped = escapeHtml(value);
  return /\n|:-|\?-/.test(value) ? `<pre>${escaped}</pre>` : escaped;
}

function normalizeCode(value) {
  return value.replace(/%.*$/gm, '').replace(/\s+/g, ' ').trim().toLowerCase();
}

for (const q of questions) {
  const section = document.createElement('section');
  section.className = 'question' + (q.interactive ? '' : ' coding');
  section.innerHTML = `<h2>Question ${q.number}</h2><div class="prompt">${renderPrompt(q.promptBlocks || [q.prompt])}</div>`;

  if (q.interactive) {
    const options = document.createElement('div');
    options.className = 'options';
    q.options.forEach((text, index) => {
      const button = document.createElement('button');
      button.className = 'option';
      button.type = 'button';
      button.textContent = text;
      button.addEventListener('click', () => {
        const selected = index + 1;
        const correct = q.answers.includes(selected);
        [...options.children].forEach((child, childIndex) => {
          child.disabled = true;
          if (q.answers.includes(childIndex + 1)) child.classList.add('correct');
        });
        if (!correct) button.classList.add('wrong');
        feedback.classList.add('show');
        feedback.innerHTML = `<strong>${correct ? 'Correct.' : 'Incorrect.'}</strong> Correct answer: ${q.answers.map(n => escapeHtml(q.options[n - 1])).join(' / ')}<br>${escapeHtml(q.reason)}`;
      });
      options.appendChild(button);
    });
    const feedback = document.createElement('div');
    feedback.className = 'feedback';
    section.appendChild(options);
    section.appendChild(feedback);
  } else if (q.isCodeQuestion) {
    const practice = document.createElement('div');
    practice.className = 'practice';
    const storageKey = `${document.title}-q${q.number}`;
    practice.innerHTML = `
      <div class="practice-grid">
        <div>
          <label for="answer-${q.number}">Your code</label>
          <textarea id="answer-${q.number}" spellcheck="false" placeholder="Write your Prolog answer here..."></textarea>
          <div class="button-row">
            <button class="show-answer compare" type="button">Compare</button>
            <button class="show-answer" type="button">Show answer</button>
          </div>
          <p class="compare-note">The comparison is visual. The exact-text check is only a rough guide because Prolog answers can be written in several valid ways.</p>
        </div>
        <div class="comparison">
          <h3>Model answer</h3>
          <div class="answer show">${renderAnswer(q.shortAnswer)}</div>
          <h3>Your answer</h3>
          <pre class="student-answer"></pre>
          <p class="compare-note exact-result"></p>
        </div>
      </div>`;
    const textarea = practice.querySelector('textarea');
    const compareButton = practice.querySelector('button.compare');
    const showButton = practice.querySelector('.button-row button:not(.compare)');
    const comparison = practice.querySelector('.comparison');
    const studentAnswer = practice.querySelector('.student-answer');
    const exactResult = practice.querySelector('.exact-result');
    textarea.value = localStorage.getItem(storageKey) || '';
    textarea.addEventListener('input', () => localStorage.setItem(storageKey, textarea.value));
    const showComparison = () => {
      const value = textarea.value.trim();
      studentAnswer.textContent = value || 'No answer written yet.';
      const exact = normalizeCode(value) === normalizeCode(q.shortAnswer);
      exactResult.textContent = value ? `Rough exact-text check: ${exact ? 'matches the model answer.' : 'does not exactly match; compare the logic manually.'}` : 'Write an answer first, then compare it with the model.';
      comparison.classList.add('show');
    };
    compareButton.addEventListener('click', showComparison);
    showButton.addEventListener('click', () => {
      comparison.classList.toggle('show');
      if (comparison.classList.contains('show')) showComparison();
      showButton.textContent = comparison.classList.contains('show') ? 'Hide answer' : 'Show answer';
    });
    section.appendChild(practice);
  } else {
    const button = document.createElement('button');
    button.className = 'show-answer';
    button.type = 'button';
    button.textContent = 'Show answer';
    const answer = document.createElement('div');
    answer.className = 'answer';
    answer.innerHTML = renderAnswer(q.shortAnswer);
    button.addEventListener('click', () => {
      answer.classList.toggle('show');
      button.textContent = answer.classList.contains('show') ? 'Hide answer' : 'Show answer';
    });
    section.appendChild(button);
    section.appendChild(answer);
  }

  quiz.appendChild(section);
}
</script>
