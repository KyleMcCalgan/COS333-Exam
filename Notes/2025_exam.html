<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>COS 333 Examination 2025</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f6f7f9; color: #20242a; }
    main { max-width: 940px; margin: 0 auto; padding: 28px 18px 48px; }
    .back-link { display: inline-flex; align-items: center; gap: 8px; margin-bottom: 16px; color: #243246; text-decoration: none; font-size: 14px; font-weight: 600; }
    .back-link:hover { color: #0f172a; text-decoration: underline; }
    h1 { font-size: 28px; margin: 0 0 4px; }
    .meta { font-size: 14px; color: #5a6272; margin-bottom: 20px; }
    .question { background: white; border: 1px solid #d9dde3; border-radius: 8px; padding: 20px; margin: 16px 0; }
    .question h2 { font-size: 18px; margin: 0 0 12px; }
    .points { font-size: 13px; color: #5f6f89; font-weight: normal; margin-left: 8px; }
    .prompt { line-height: 1.6; margin-bottom: 14px; }
    .prompt p { margin: 0 0 10px; }
    .prompt pre { background: #f4f6f8; border: 1px solid #d8dde4; border-radius: 6px; overflow-x: auto; padding: 12px; white-space: pre-wrap; font-size: 13px; }
    .options { display: grid; gap: 8px; }
    button { font: inherit; }
    button.option { text-align: left; border: 1px solid #c7cdd6; background: #fff; padding: 10px 12px; border-radius: 6px; cursor: pointer; font-size: 15px; }
    button.option:hover { border-color: #62748e; background: #f8fafc; }
    button.show-answer { border: 1px solid #5f6f89; background: #f8fafc; color: #243246; padding: 9px 12px; border-radius: 6px; cursor: pointer; margin-top: 10px; }
    button.show-answer:hover { background: #edf2f7; }
    button.correct { border-color: #198754; background: #eaf7ef; }
    button.wrong { border-color: #c73333; background: #fdecec; }
    .feedback, .answer { display: none; margin-top: 12px; padding: 12px; border-radius: 6px; background: #eef3fb; line-height: 1.5; font-size: 14px; }
    .feedback.show, .answer.show { display: block; }
    .answer pre { background: #f4f6f8; border: 1px solid #d8dde4; border-radius: 6px; padding: 12px; white-space: pre-wrap; font-size: 13px; margin: 6px 0 0; }
    .coding { border-left: 4px solid #667085; }
    .multi-hint { font-size: 13px; color: #a0522d; font-style: italic; margin-bottom: 10px; }
  </style>
</head>
<body>
<main>
  <a class="back-link" href="past-papers.html">&larr; Back to Past Papers</a>
  <h1>COS 333 Examination <span class="points">17 June 2025</span></h1>
  <div class="meta">Examiner: Mr W. S. van Heerden &nbsp;|&nbsp; Total: 40 marks &nbsp;|&nbsp; 31 Questions</div>
  <div id="quiz"></div>
</main>
<script>
const questions = [
  {n:1, pts:1, multi:false, interactive:true,
   prompt:"Consider the types of cost that can be associated with a programming language, and select the one that is <strong>most relevant to consider in a modern computing context</strong>.",
   opts:["Cost of compiling programs","Cost of executing programs","Cost of reliability","Cost of the language implementation system"],
   ans:[3], reason:"In modern computing, hardware is cheap and compilation/execution are fast. The dominant cost is now reliability — bugs and system failures are enormously expensive, making reliability the most relevant concern."},
  {n:2, pts:1, multi:false, interactive:true,
   prompt:"Consider the following programming languages, and select the one that has the <strong>highest level of portability</strong>.",
   opts:["Fortran I","PL/I","Swift","Java"],
   ans:[4], reason:"Java compiles to platform-independent bytecode that runs on any JVM — designed explicitly around the 'write once, run anywhere' portability goal."},
  {n:3, pts:1, multi:false, interactive:true,
   prompt:"Consider the following programming languages, and select the one that had the <strong>highest overall readability</strong>.",
   opts:["C++","BASIC","Ada","C#"],
   ans:[3], reason:"Ada was specifically designed for readability and reliability in safety-critical systems — strict typing, clear block structure, and no implicit coercions make it the most readable of these options."},
  {n:4, pts:1, multi:false, interactive:true,
   prompt:"Consider the following programming languages, and select the one that <strong>focused the most on the well-definedness</strong> of the original language design.",
   opts:["Fortran I","ALGOL 68","C","C++"],
   ans:[2], reason:"ALGOL 68 introduced the Van Wijngaarden grammar (a two-level formal grammar) to give the language a rigorous, well-defined specification — the most formally defined language of this set."},
  {n:5, pts:5, multi:false, interactive:false, coding:true,
   prompt:"Write a Scheme function named <code>getZerosDoublePositives</code>, applied to a simple numeric list <code>lst</code>. Yield a list where <strong>zero values remain unchanged</strong>, <strong>positive values are doubled</strong>, and <strong>negative values are omitted</strong>.<br><br>Examples:<pre>(getZerosDoublePositives '())           ; =&gt; ()\n(getZerosDoublePositives '(-5))         ; =&gt; ()\n(getZerosDoublePositives '(-1 4 0 -3 12)) ; =&gt; (8 0 24)</pre>Submit <code>u99999999.scm</code> to slot <em>\"Examination: Scheme Function\"</em>.",
   shortAnswer:"(define (getZerosDoublePositives lst)\n  (cond\n    ((null? lst) '())\n    ((zero? (car lst))\n     (cons 0 (getZerosDoublePositives (cdr lst))))\n    ((> (car lst) 0)\n     (cons (* 2 (car lst)) (getZerosDoublePositives (cdr lst))))\n    (else (getZerosDoublePositives (cdr lst)))))"},
  {n:6, pts:5, multi:false, interactive:false, coding:true,
   prompt:"Write a Prolog proposition called <code>getNegativesNegatePositives(L1, L2)</code>. L2 contains the values in L1 in order where <strong>negative values remain unchanged</strong>, <strong>positive values are negated</strong>, and <strong>zero values are omitted</strong>.<br><br>Examples:<pre>?- getNegativesNegatePositives([0], X).       % X = []\n?- getNegativesNegatePositives([1, 0, -2, 0], X). % X = [-1, -2]</pre>Submit <code>u99999999.pl</code> to slot <em>\"Examination: Prolog Proposition\"</em>.",
   shortAnswer:"getNegativesNegatePositives([], []).\ngetNegativesNegatePositives([0|T], R) :- getNegativesNegatePositives(T, R).\ngetNegativesNegatePositives([H|T], [H|R]) :- H < 0, getNegativesNegatePositives(T, R).\ngetNegativesNegatePositives([H|T], [N|R]) :- H > 0, N is -H, getNegativesNegatePositives(T, R)."},
  {n:7, pts:1, multi:false, interactive:false,
   prompt:"Consider this code — <code>var switch</code> is declared as a variable name, and <code>switch (input)</code> is used as a control structure. Identify and fill in the <strong>kind of special word</strong> that <code>switch</code> is in this program.",
   shortAnswer:"Keyword\n\nA keyword is a word that is special only in certain contexts — it CAN be used as a variable name. A reserved word CANNOT be used as a variable name. Since 'switch' is used as both a variable and a control structure, it must be a keyword, not a reserved word."},
  {n:8, pts:1, multi:false, interactive:true,
   prompt:"Consider <strong>accessing and modifying global variables in PHP, Python, and C</strong>, and select the most correct statement.",
   opts:["PHP's approach is less writable than both Python and C.","PHP's approach is less reliable than both Python and C.","PHP's approach is less readable than both Python and C.","PHP's approach has a lower cost of execution than both Python and C."],
   ans:[1], reason:"PHP requires explicit 'global $var' declaration inside every function before using global variables, and uses $ prefix syntax — more verbose than Python's 'global var' and far more verbose than C's direct global access."},
  {n:9, pts:1, multi:false, interactive:true,
   prompt:"Fortran supports <strong>elemental array operations</strong>, not supported in most other high-level languages. Select the reason that describes a <strong>strong justification</strong> for their inclusion.",
   opts:["Elemental array operations improve the orthogonality of Fortran.","Elemental array operations make sense because their purpose is unambiguous.","Elemental array operations make sense for the implementation method that Fortran uses.","Elemental array operations make sense in the programming domain for which Fortran was designed."],
   ans:[4], reason:"Fortran was designed for scientific/numerical computing, where operations on entire arrays (add two matrices, etc.) are ubiquitous — elemental operations directly support the scientific programming domain."},
  {n:10, pts:1, multi:false, interactive:true,
   prompt:"Consider <strong>list comprehensions in Python</strong>, and select the most correct statement.",
   opts:["List comprehensions improve the readability of list operations in Python.","List comprehensions improve the writability of list operations in Python.","List comprehensions improve the reliability of list operations in Python.","List comprehensions improve the cost of training programmers in Python."],
   ans:[2], reason:"List comprehensions provide a concise, expressive syntax for building lists from sequences, directly improving writability by reducing boilerplate."},
  {n:11, pts:1, multi:false, interactive:true,
   prompt:"Consider <strong>operator precedence and associativity in APL</strong>, and select the most correct statement.",
   opts:["Operator precedence and associativity in APL is highly orthogonal.","Operator precedence and associativity in APL is very complex due to the large number of operators.","Operator precedence and associativity in APL introduces a high cost of execution.","Operator precedence and associativity in APL is unreliable."],
   ans:[1], reason:"APL has one uniform rule: all operators have the same precedence and associate right-to-left. This single consistent rule is highly orthogonal — no exceptions or special cases."},
  {n:12, pts:1, multi:false, interactive:true,
   prompt:"Consider <strong>operators in Ruby</strong>, and select the most correct statement.",
   opts:["Operators in Ruby are implemented in a way that is not very orthogonal.","Operators in Ruby are not very writable.","Operators in Ruby have a high cost of execution.","Operators in Ruby are very reliable."],
   ans:[4], reason:"Ruby implements all operators as methods on objects, following a consistent OOP model. This uniform mechanism makes operators predictable and reliable."},
  {n:13, pts:1, multi:false, interactive:true,
   prompt:"Consider <strong>mixed mode arithmetic expressions in F# and C++</strong>, and select the most correct statement.",
   opts:["Mixed mode arithmetic expressions in F# are less readable than in C++.","Mixed mode arithmetic expressions in F# are more writable than in C++.","Mixed mode arithmetic expressions in F# have a higher execution cost than in C++.","Mixed mode arithmetic expressions in F# are more reliable than in C++."],
   ans:[4], reason:"F# requires explicit type conversions (no implicit coercions), meaning the programmer's intent is always clear and type errors are caught at compile time — more reliable than C++'s implicit coercions."},
  {n:14, pts:1, multi:false, interactive:true,
   prompt:"Consider this loop:<pre>while ((total &lt;= 100) or ((input = read()) != EOF)) {\n   total = total + input\n}</pre>Select the statement that most correctly describes a <strong>problem</strong>.",
   opts:["If <code>or</code> is short-circuit evaluated a side effect will occur, which causes a problem.","If <code>or</code> is short-circuit evaluated a side effect will <strong>not</strong> occur, which causes a problem.","If <code>or</code> is <strong>not</strong> short-circuit evaluated a side effect will occur, which causes a problem.","If <code>or</code> is <strong>not</strong> short-circuit evaluated a side effect will not occur, which causes a problem."],
   ans:[2], reason:"When total ≤ 100 (left side true), short-circuit evaluation skips read() — the side effect of reading new input does NOT occur, so 'input' is stale and the loop body uses an old value."},
  {n:15, pts:1, multi:false, interactive:true,
   prompt:"Consider <strong>conditional targets</strong>, and select the most correct statement.",
   opts:["Conditional targets reduce the writability of assignments.","Conditional targets increase the readability of assignments.","Conditional targets increase the cost of execution of assignments.","Conditional targets reduce the reliability of assignments."],
   ans:[4], reason:"Conditional targets (like Perl's '(cond ? a : b) = val') make it unclear which variable is being modified — the assignment target is ambiguous, reducing reliability."},
  {n:16, pts:1, multi:false, interactive:true,
   prompt:"Consider <strong>multiple-target multiple-source assignments in Ruby</strong>, and select the most correct statement.",
   opts:["Multiple-target multiple-source assignments make Ruby more writable.","Multiple-target multiple-source assignments make Ruby more readable.","Multiple-target multiple-source assignments make Ruby more reliable.","Multiple-target multiple-source assignments decrease the cost of execution of Ruby."],
   ans:[1], reason:"Ruby allows 'a, b = b, a' for swaps and 'x, y, z = expr' for parallel assignment — significantly more concise and writable than using temporary variables."},
  {n:17, pts:1, multi:false, interactive:true,
   prompt:"Consider the method that <strong>Python and Perl</strong> use to <strong>disambiguate nested selectors</strong>, and select the most correct statement.",
   opts:["Python's approach is less writable than Perl's approach.","Python's approach is less readable than Perl's approach.","Python's approach can be less reliable than Perl's approach.","Python's approach has a higher cost of execution than Perl's approach."],
   ans:[3], reason:"Python uses indentation to define blocks — a mis-indent silently changes the nesting of an if statement without a syntax error, making it potentially less reliable than Perl's explicit braces."},
  {n:18, pts:1, multi:false, interactive:true,
   prompt:"You have variables <code>first</code> and <code>second</code>, and wish to assign a value to <code>second</code> depending on <code>first</code> using a <strong>multiple-way selection</strong>. Select the language that allows this in the <strong>most writable</strong> way.",
   opts:["C++","JavaScript","C#","Ruby"],
   ans:[4], reason:"Ruby's case/when expression can match against any type, ranges, regex, and return a value directly — far more flexible and writable than C++'s switch (restricted to integers/enums) or JS/C# switch."},
  {n:19, pts:1, multi:false, interactive:true,
   prompt:"Consider <strong>counter-controlled loops in C++</strong>, and select the most correct statement.",
   opts:["Counter-controlled loops in C++ are reliable because the loop body always executes a fixed number of times, which is clear from the three control expressions.","Counter-controlled loops in C++ are reliable because it is possible to include the definition of the loop variable in the first control expression.","Counter-controlled loops in C++ are unreliable because it is possible to branch into the loop body.","Counter-controlled loops in C++ are unreliable because it is not possible to modify how many times the loop body executes once execution has entered the loop."],
   ans:[2], reason:"Defining the loop variable inside the for statement (e.g. 'for (int i = 0; ...)') scopes it to the loop, preventing accidental access or modification outside — this improves reliability."},
  {n:20, pts:1, multi:false, interactive:true,
   prompt:"Consider <strong>user-located loop control mechanisms in Java and C++</strong>, and select the most correct statement.",
   opts:["Java has more writable user-located loop control mechanisms than C++ does.","Java has less writable user-located loop control mechanisms than C++ does.","User-located loop control mechanisms are equally writable in Java and C++.","Java has less reliable user-located loop control mechanisms than C++ does."],
   ans:[1], reason:"Java supports labeled break and labeled continue (break label; continue label;), allowing the programmer to target specific outer loops in nested structures — more writable than C++'s unlabeled break/continue."},
  {n:21, pts:1, multi:false, interactive:false,
   prompt:"Consider this Ruby code:<pre>def doSomething()\n  num = 3\n  while num > 0\n      yield num\n      num = num - 1\n  end\nend</pre>Provide the <strong>output</strong> if <code>doSomething</code> is used with a block that has one formal parameter and prints it followed by a single space.",
   shortAnswer:"3 2 1 \n\nTrace:\n  num=3: yield 3 → print '3 ', num=2\n  num=2: yield 2 → print '2 ', num=1\n  num=1: yield 1 → print '1 ', num=0\n  Exit loop"},
  {n:22, pts:1, multi:false, interactive:true,
   prompt:"Some languages allow <strong>default values</strong> to be given to a formal parameter when an actual parameter is left out. Select the option that describes a mechanism that allows <strong>any</strong> actual parameter to be left out regardless of the order formal parameters are listed.",
   opts:["By using positional parameters.","By using keyword parameters.","It is impossible to allow any actual parameter to be left out regardless of order.","Subprograms always allow any actual parameter to be left out."],
   ans:[2], reason:"Keyword parameters let the caller explicitly name which arguments to pass, so any argument (anywhere in the list) can be omitted as long as it has a default — order doesn't matter."},
  {n:23, pts:1, multi:false, interactive:true,
   prompt:"Consider <strong>subprograms in Ruby</strong>, and select the most correct statement.",
   opts:["Ruby does not allow a subprogram to have a variable number of parameters.","Ruby allows variable parameters but all must have the same type because they are stored in a fixed-type array.","Ruby allows variable parameters of any type because the parameters are stored in an array of objects.","Ruby allows variable parameters of any type because the parameters are stored in an array and are all dynamically typed."],
   ans:[4], reason:"Ruby is dynamically typed — variables have no fixed type. A variable-length parameter list (*args) is stored in an array where each element can be any type (dynamically typed)."},
  {n:24, pts:1, multi:false, interactive:true,
   prompt:"This C++ code is not legal:<pre>int doSomething(int val)   { return val + 2; }\nfloat doSomething(int val) { return val + 1.0; }</pre>Select the option that most correctly describes the <strong>underlying reason</strong> for this being illegal.",
   opts:["C++ does not support overloaded subprograms.","Variables of different types cannot be added.","C++ performs a large number of coercions.","C++ performs no coercions."],
   ans:[3], reason:"C++ performs many implicit coercions — both 'int' and 'float' return values can coerce to each other. When calling doSomething(5), the compiler cannot determine which overload to use solely from the parameter type, making the overload set ambiguous."},
  {n:25, pts:1, multi:false, interactive:true,
   prompt:"Consider this JavaScript code:<pre>function doSomething(a, b) {\n   return function(y) { return (a + b) - y; }\n}\nvar thing = doSomething(10, 20);</pre>Select the option that most correctly describes what <code>thing</code> is.",
   opts:["The function <code>function(y) {return (a + b) - y;}</code>","The function <code>function(y) {return (10 + 20) - y;}</code>","A reference to the <code>doSomething</code> function.","An invalid function, because a value for <code>y</code> cannot be specified."],
   ans:[2], reason:"doSomething returns a closure that captures a=10 and b=20 from the enclosing scope. 'thing' is effectively function(y){return 30-y;} — a closure with the captured values embedded."},
  {n:26, pts:1, multi:false, interactive:true,
   prompt:"Consider <strong>pass-by-result parameters</strong>, and select the most correct statement.",
   opts:["Pass-by-result parameters can be passed using a physical copy or an access path.","Pass-by-result parameters can be passed using only a physical copy because using an access path would create a functional side effect.","Pass-by-result parameters can be passed using only a physical copy because the formal parameter is deallocated once the function terminates.","Pass-by-result parameters can be passed using only an access path because a physical copy would take up additional memory.","Pass-by-result parameters can be passed using only an access path because a physical copy would cause the calling function to work with an out-of-date copy."],
   ans:[3], reason:"The formal parameter's storage is on the called function's stack, which is deallocated on return. Returning via access path is therefore impossible — the memory is gone. A physical copy (value written back to caller's variable) is the only option."},
  {n:27, pts:1, multi:false, interactive:true,
   prompt:"Consider <strong>multidimensional arrays as subprogram parameters in C and C#</strong>, and select the most correct statement.",
   opts:["The approach in C is more writable than in C#.","The approach in C is more readable than in C#.","The approach in C is more reliable than in C#.","The approach in C is less orthogonal than in C#."],
   ans:[4], reason:"In C, you must specify all dimensions except the first (e.g. void f(int a[][5])) — the dimension is part of the type inconsistently. C# passes multidimensional arrays uniformly without specifying dimensions in the parameter type, making it more orthogonal."},
  {n:28, pts:2, multi:true, interactive:true,
   prompt:"Four classes: A (base), B and C inherit from A, D inherits from both B and C. An <strong>implicit name collision</strong> is possible. Select <strong>only</strong> the implementation details that result in an implicit (not explicit) collision. <em>(Incorrectly selected options will be penalised.)</em>",
   opts:["Defining a method named <code>myMethod</code> in class A.","Defining a method named <code>myMethod</code> in class B.","Defining a method named <code>myMethod</code> in class C.","Defining a method named <code>myMethod</code> in class D."],
   ans:[1], reason:"If only A defines myMethod and B/C don't override it, D implicitly inherits two copies (one via B, one via C) — an implicit collision with no explicit redefinition anywhere."},
  {n:29, pts:2, multi:true, interactive:true,
   prompt:"You wish to implement a linked list and its nodes. Select <strong>only</strong> the programming language constructs that can be used to implement the <strong>linked list nodes</strong>. <em>(Incorrectly selected options will be penalised.)</em>",
   opts:["A <code>struct</code> in C#","A <code>struct</code> in C++","A <code>class</code> in C++","A <code>union</code> in C++"],
   ans:[2,3], reason:"A C++ struct can hold a data field and a pointer to the next node — identical to a class in this context. A C# struct is a value type (stack allocated, no pointer semantics for self-referential nodes). A C++ union holds only one member at a time, unsuitable for a node that needs both data AND a next pointer simultaneously."},
  {n:30, pts:1, multi:false, interactive:true,
   prompt:"Consider <strong>Ruby</strong>, and select the most correct statement.",
   opts:["Ruby has highly efficient primitive types.","Ruby has support for a programmer to explicitly allocate and deallocate heap memory for objects.","Ruby allows the programmer to choose between dynamic and static message binding.","Ruby classes have very unreliable message interfaces."],
   ans:[4], reason:"Ruby's dynamic classes can be reopened and modified at any time — methods can be added, changed, or removed at runtime. This makes the class interface unpredictable, i.e. unreliable."},
  {n:31, pts:1, multi:false, interactive:true,
   prompt:"Consider <strong>Java and C++</strong>, and select the most correct statement.",
   opts:["Java uses objects less exclusively than C++.","Java supports some of the benefits of multiple inheritance, while preventing name collisions.","Java supports some of the benefits of multiple inheritance, but does not prevent name collisions.","Java exclusively supports dynamic message binding, while C++ allows the programmer to choose between dynamic and static message binding."],
   ans:[4], reason:"In Java every method call is dynamically bound (all methods are virtual by default). In C++, the programmer must explicitly use the 'virtual' keyword to get dynamic binding; non-virtual methods are statically bound."}
];

const quiz = document.getElementById('quiz');
for (const q of questions) {
  const sec = document.createElement('section');
  sec.className = 'question' + (q.coding ? ' coding' : '');
  let body = '';
  if (q.interactive) {
    if (q.multi) body += `<p class="multi-hint">Select ALL correct options. (Incorrectly selected options are penalised.)</p>`;
    body += `<div class="options">`;
    q.opts.forEach((o,i) => { body += `<button class="option" data-idx="${i+1}">${i+1}. ${o}</button>`; });
    body += `</div><div class="feedback"></div>`;
  } else {
    body += `<button class="show-answer">Show model answer</button><div class="answer"><strong>Model Answer:</strong><pre>${escHtml(q.shortAnswer)}</pre></div>`;
  }
  sec.innerHTML = `<h2>Question ${q.n} <span class="points">(${q.pts} pt${q.pts>1?'s':''})</span></h2><div class="prompt">${q.prompt}</div>${body}`;
  quiz.appendChild(sec);
  if (q.interactive) {
    const selected = new Set();
    const btns = sec.querySelectorAll('button.option');
    const fb = sec.querySelector('.feedback');
    btns.forEach(btn => btn.addEventListener('click', () => {
      const idx = +btn.dataset.idx;
      if (!q.multi) { btns.forEach(b => b.classList.remove('correct','wrong')); selected.clear(); }
      selected.has(idx) ? selected.delete(idx) : selected.add(idx);
      if (!q.multi) {
        const ok = q.ans.includes(idx);
        btn.classList.add(ok?'correct':'wrong');
        if (!ok) q.ans.forEach(a => btns[a-1].classList.add('correct'));
        fb.textContent = (ok?'✓ Correct. ':'✗ Incorrect. ') + q.reason;
        fb.className = 'feedback show';
      } else {
        btns.forEach(b => b.classList.remove('correct','wrong'));
        selected.forEach(s => btns[s-1].classList.add(q.ans.includes(s)?'correct':'wrong'));
        q.ans.forEach(a => btns[a-1].classList.add('correct'));
        fb.textContent = q.reason; fb.className = 'feedback show';
      }
    }));
  } else {
    const btn = sec.querySelector('.show-answer'), ans = sec.querySelector('.answer');
    if (btn) btn.addEventListener('click', () => { ans.classList.toggle('show'); btn.textContent = ans.classList.contains('show')?'Hide answer':'Show model answer'; });
  }
}
function escHtml(s) { return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
