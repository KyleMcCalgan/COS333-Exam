<script>
const questions = [{"number": 1, "interactive": false, "prompt": "Assume that the following Prolog-like program code is provided:\n\ntennis(angela). soccer(gary). sportsPerson(X) :- soccer(X). sportsPerson(X) :- tennis(X).\n\nAlso assume that the following query is provided:\n\n?- sportsPerson(angela).\n\nSelect from the following options to complete the following steps that are performed from the first step to the last one, if it is assumed that bottom-up resolution (or forward chaining) is performed to prove the query. Note that standard Prolog implementations do not use bottom-up resolution (they use top-down resolution). Select \"No step performed\" for any steps you do not use. Step 1: Step 2:", "promptBlocks": ["Assume that the following Prolog-like program code is provided:", "tennis(angela). soccer(gary). sportsPerson(X) :- soccer(X). sportsPerson(X) :- tennis(X).", "Also assume that the following query is provided:", "?- sportsPerson(angela).", "Select from the following options to complete the following steps that are performed from the first step to the last one, if it is assumed that bottom-up resolution (or forward chaining) is performed to prove the query. Note that standard Prolog implementations do not use bottom-up resolution (they use top-down resolution). Select \"No step performed\" for any steps you do not use. Step 1: Step 2:"], "options": [], "answers": [], "reason": "", "shortAnswer": "Step 1: Derive sportsPerson(gary) from soccer(gary).\nStep 2: Derive sportsPerson(angela) from tennis(angela), proving the query.", "isCodeQuestion": false}, {"number": 2, "interactive": true, "prompt": "Assume that you have a Prolog program containing three kinds of facts related to all the animals in a city. The first type of fact has the form cat(X) and means that the atom X is a cat. The second type of fact has the form dog(X) and means that the atom X is a dog. The third type of fact has the form pet(X, Y) and means that the atom X is a pet owned by a person represented by the atom Y. You wish to write a query that determines whether peter owns a pet that is a cat. Consider the following queries, and select the one that most efficiently determines an instantiation for the pet of peter.", "promptBlocks": ["Assume that you have a Prolog program containing three kinds of facts related to all the animals in a city. The first type of fact has the form cat(X) and means that the atom X is a cat. The second type of fact has the form dog(X) and means that the atom X is a dog. The third type of fact has the form pet(X, Y) and means that the atom X is a pet owned by a person represented by the atom Y. You wish to write a query that determines whether peter owns a pet that is a cat. Consider the following queries, and select the one that most efficiently determines an instantiation for the pet of peter."], "options": ["?- cat(X), pet(X, peter).", "?- pet(X, peter), cat(X).", "?- cat(X). ?- pet(X, peter).", "?- pet(X, peter). ?- cat(X)."], "answers": [2], "reason": "Checking peter's pets first narrows X before testing whether that pet is a cat.", "shortAnswer": "No model answer has been added for this question yet.", "isCodeQuestion": false}, {"number": 3, "interactive": false, "prompt": "Assume that you have Prolog facts describing tenants and addresses, taking the following form: tenant(alice, tony). tenant(tom, jane). tenant(joe, tony). tenant(mary, jane). address(alice, pineStreet12). address(tom, shillingLane15). address(joe, duncanRoad6). address(mary, shillingLane15). address(jonathan, pineStreet12). Here, tenant(X, Y) means that person X is the tenant of property owner Y (meaning that X rents a flat from Y), and address(X, Y) means that person X currently lives at address Y. Write a Prolog proposition called ownsSharedProperty(X), which succeeds if atom X is the owner of a property rented by two individuals, meaning that X has two different tennants with the same address. In the above example, only jane owns a shared property. This is because tom and mary are both tenants of jane, and both tom and mary have shillingLane15 as an address. Note that, even though alice and jonathan both have pineStreet12 as an address, this does not mean that tony owns a shared property. This is because alice is a tenant of tony, but jonathan is not (implying that jonathan is just visiting alice). Therefore, no other atoms satisfy the ownsSharedProperty proposition in this example. You may assume that no person is a tenant of more than one property owner, and that no person lives at multiple addresses. Hint 1: When testing your proposition, use variables, such as in the following query: ?- ownsSharedProperty(X) Then use Prolog\u2019s support for re-querying to determine all the atoms that satisfy the ownsSharedProperty proposition. Hint 2: The built-in not predicate can be applied to propositions. For example, if the proposition parent(peter, tina) is true, then not(parent(peter, tina)) will be false. Submit your program code in a file named s99999999.pl (where 99999999 is your student number) to the assignment submission slot labelled \"Semester Test 2: Simple Prolog Proposition\", and select the \"Yes\" answer below once you have done so. If you do not make a submission, select the \"No\" answer below. Take careful note of the following requirements: \uf0b7 You may not define any additional facts other than tenant and address facts. If you do so, you will forfeit all marks for this question. You are required to write one or more rules that together define the cousin proposition. \uf0b7 Your submission must be working Prolog code that will be successfully interpreted by the SWI- Prolog interpreter installed on the Windows computers in the Informatorium. You may (and should) use this SWI-Prolog interpreter to test your submission. For notes on using the interpreter, and re- querying, see the specification for Practical 3. Once you have finished writing your program, save it in a text file with the appropriate name, and submit it to the correct upload slot. \uf0b7 You may define additional helper propositions. \uf0b7 Note that you may only use the simple constants, variables, list manipulation methods, arithmetic and relational expressions, and built-in predicates discussed in the textbook and slides. In particular, do not use if-then, if-then-else, and similar constructs. You may NOT use any more complex predicates provided by the Prolog system itself. In other words, you must write all your own propositions. Failure to observe this rule will result in all marks for this question being forfeited. Yes No", "promptBlocks": ["Assume that you have Prolog facts describing tenants and addresses, taking the following form: tenant(alice, tony). tenant(tom, jane). tenant(joe, tony). tenant(mary, jane). address(alice, pineStreet12). address(tom, shillingLane15). address(joe, duncanRoad6). address(mary, shillingLane15). address(jonathan, pineStreet12). Here, tenant(X, Y) means that person X is the tenant of property owner Y (meaning that X rents a flat from Y), and address(X, Y) means that person X currently lives at address Y. Write a Prolog proposition called ownsSharedProperty(X), which succeeds if atom X is the owner of a property rented by two individuals, meaning that X has two different tennants with the same address. In the above example, only jane owns a shared property. This is because tom and mary are both tenants of jane, and both tom and mary have shillingLane15 as an address. Note that, even though alice and jonathan both have pineStreet12 as an address, this does not mean that tony owns a shared property. This is because alice is a tenant of tony, but jonathan is not (implying that jonathan is just visiting alice). Therefore, no other atoms satisfy the ownsSharedProperty proposition in this example. You may assume that no person is a tenant of more than one property owner, and that no person lives at multiple addresses. Hint 1: When testing your proposition, use variables, such as in the following query: ?- ownsSharedProperty(X) Then use Prolog\u2019s support for re-querying to determine all the atoms that satisfy the ownsSharedProperty proposition. Hint 2: The built-in not predicate can be applied to propositions. For example, if the proposition parent(peter, tina) is true, then not(parent(peter, tina)) will be false. Submit your program code in a file named s99999999.pl (where 99999999 is your student number) to the assignment submission slot labelled \"Semester Test 2: Simple Prolog Proposition\", and select the \"Yes\" answer below once you have done so. If you do not make a submission, select the \"No\" answer below. Take careful note of the following requirements: \uf0b7 You may not define any additional facts other than tenant and address facts. If you do so, you will forfeit all marks for this question. You are required to write one or more rules that together define the cousin proposition. \uf0b7 Your submission must be working Prolog code that will be successfully interpreted by the SWI- Prolog interpreter installed on the Windows computers in the Informatorium. You may (and should) use this SWI-Prolog interpreter to test your submission. For notes on using the interpreter, and re- querying, see the specification for Practical 3. Once you have finished writing your program, save it in a text file with the appropriate name, and submit it to the correct upload slot. \uf0b7 You may define additional helper propositions. \uf0b7 Note that you may only use the simple constants, variables, list manipulation methods, arithmetic and relational expressions, and built-in predicates discussed in the textbook and slides. In particular, do not use if-then, if-then-else, and similar constructs. You may NOT use any more complex predicates provided by the Prolog system itself. In other words, you must write all your own propositions. Failure to observe this rule will result in all marks for this question being forfeited. Yes No"], "options": [], "answers": [], "reason": "", "shortAnswer": "ownsSharedProperty(X) :-\n    tenant(A, X),\n    tenant(B, X),\n    address(A, Addr),\n    address(B, Addr),\n    not(A = B).", "isCodeQuestion": true}, {"number": 4, "interactive": false, "prompt": "Write a Prolog proposition called countNonMatching(E, L, C), which succeeds if C is the number of elements in the list L that do not match the atom E. You may assume that list L is a simple list containing only atoms. For example, the query: ?- countNonMatching(a, [a, a], X). should be true with the instantiation X = 0. This is because there are no elements that do not match the atom a in the list [a, a]. Similarly, the query ?- countNonMatching(a, [a, b, a, c, d], X). should be true with the instantiation X = 3. This is because b, c, and d do not match the atom a in the list [a, b, a, c, d]. Submit your program code in a file named s99999999.pl (where 99999999 is your student number) to the assignment submission slot labelled \"Semester Test 2: List Processing Prolog Proposition\", and select the \"Yes\" answer below once you have done so. If you do not make a submission, select the \"No\" answer below. Take careful note of the following requirements: \uf0b7 Your submission must be working Prolog code that will be successfully interpreted by the SWI- Prolog interpreter installed on the Windows computers in the Informatorium. You may (and should) use this SWI-Prolog interpreter to test your submission. For notes on using the interpreter, and re- querying, see the specification for Practical 3. Once you have finished writing your program, save it in a text file with the appropriate name, and submit it to the correct upload slot. \uf0b7 You may define additional helper propositions. \uf0b7 Note that you may only use the simple constants, variables, list manipulation methods, arithmetic and relational expressions, and built-in predicates discussed in the textbook and slides. In particular, do not use if-then, if-then-else, and similar constructs. You may NOT use any more complex predicates provided by the Prolog system itself. In other words, you must write all your own propositions. Failure to observe this rule will result in all marks for this question being forfeited. Yes No", "promptBlocks": ["Write a Prolog proposition called countNonMatching(E, L, C), which succeeds if C is the number of elements in the list L that do not match the atom E. You may assume that list L is a simple list containing only atoms. For example, the query: ?- countNonMatching(a, [a, a], X). should be true with the instantiation X = 0. This is because there are no elements that do not match the atom a in the list [a, a]. Similarly, the query ?- countNonMatching(a, [a, b, a, c, d], X). should be true with the instantiation X = 3. This is because b, c, and d do not match the atom a in the list [a, b, a, c, d]. Submit your program code in a file named s99999999.pl (where 99999999 is your student number) to the assignment submission slot labelled \"Semester Test 2: List Processing Prolog Proposition\", and select the \"Yes\" answer below once you have done so. If you do not make a submission, select the \"No\" answer below. Take careful note of the following requirements: \uf0b7 Your submission must be working Prolog code that will be successfully interpreted by the SWI- Prolog interpreter installed on the Windows computers in the Informatorium. You may (and should) use this SWI-Prolog interpreter to test your submission. For notes on using the interpreter, and re- querying, see the specification for Practical 3. Once you have finished writing your program, save it in a text file with the appropriate name, and submit it to the correct upload slot. \uf0b7 You may define additional helper propositions. \uf0b7 Note that you may only use the simple constants, variables, list manipulation methods, arithmetic and relational expressions, and built-in predicates discussed in the textbook and slides. In particular, do not use if-then, if-then-else, and similar constructs. You may NOT use any more complex predicates provided by the Prolog system itself. In other words, you must write all your own propositions. Failure to observe this rule will result in all marks for this question being forfeited. Yes No"], "options": [], "answers": [], "reason": "", "shortAnswer": "countNonMatching(_, [], 0).\ncountNonMatching(E, [E|T], C) :- countNonMatching(E, T, C).\ncountNonMatching(E, [H|T], C) :- not(E = H), countNonMatching(E, T, R), C is R + 1.", "isCodeQuestion": true}, {"number": 5, "interactive": true, "prompt": "Consider the following programming languages, and select the one that is the most writable in terms of name length, in a real-world context.", "promptBlocks": ["Consider the following programming languages, and select the one that is the most writable in terms of name length, in a real-world context."], "options": ["Fortran 95", "C99", "C++", "Ada"], "answers": [3], "reason": "C++ permits long descriptive names in normal real-world use, supporting writability.", "shortAnswer": "No model answer has been added for this question yet.", "isCodeQuestion": false}, {"number": 6, "interactive": false, "prompt": "Consider the following program code in a hypothetical programming language using syntax similar to C++:\n\nclass MyClass { int count;\n\nMyClass(int aCount) { count = aCount 5. }\n\nint getCount() { return count 8. } 9. }\n\nvoid main() { int class = 5 MyClass m(class) 13. }\n\nIn the above code, line numbers are provided for reference purposes. Identify the type of special words used in this programming language if the following conditions are met: \uf0b7 A compilation error occurs on line 11: \uf0b7 No compilation error occurs:", "promptBlocks": ["Consider the following program code in a hypothetical programming language using syntax similar to C++:", "class MyClass { int count;", "MyClass(int aCount) { count = aCount 5. }", "int getCount() { return count 8. } 9. }", "void main() { int class = 5 MyClass m(class) 13. }", "In the above code, line numbers are provided for reference purposes. Identify the type of special words used in this programming language if the following conditions are met: \uf0b7 A compilation error occurs on line 11: \uf0b7 No compilation error occurs:"], "options": [], "answers": [], "reason": "", "shortAnswer": "If a compilation error occurs on line 11, class is a reserved word. If no compilation error occurs, class is a keyword/contextual keyword.", "isCodeQuestion": false}, {"number": 7, "interactive": true, "prompt": "Consider the following program code in a hypothetical programming language:\n\nmyVariable = [1, 2, 3] myVariable = 14\n\nLine numbers are provided for reference purposes. Assume that the above program code results in a compilation error on line 2. Consider the following options, and select only the kind of type binding that is most likely be used for myVariable.", "promptBlocks": ["Consider the following program code in a hypothetical programming language:", "myVariable = [1, 2, 3] myVariable = 14", "Line numbers are provided for reference purposes. Assume that the above program code results in a compilation error on line 2. Consider the following options, and select only the kind of type binding that is most likely be used for myVariable."], "options": ["Explicit type declaration.", "Implicit type declaration without type inferencing.", "Implicit type declaration with type inferencing.", "Dynamic type binding."], "answers": [3], "reason": "The first assignment fixes the inferred type, so assigning a different type later causes a compile-time error.", "shortAnswer": "No model answer has been added for this question yet.", "isCodeQuestion": false}, {"number": 8, "interactive": true, "prompt": "Consider the following categories of variables, and select the one that has no name associated with it.", "promptBlocks": ["Consider the following categories of variables, and select the one that has no name associated with it."], "options": ["Static variables.", "Stack-dynamic variables.", "Explicit heap-dynamic variables.", "Implicit heap-dynamic variables."], "answers": [3], "reason": "Explicit heap-dynamic variables are allocated storage cells accessed through pointers or references and have no direct name.", "shortAnswer": "No model answer has been added for this question yet.", "isCodeQuestion": false}, {"number": 9, "interactive": false, "prompt": "Consider the following program code in a hypothetical programming language (line numbers are provided for reference purposes):\n\nvoid doSomething() myValue = 2 print myValue myValue = [5, 7, 9] print myValue\n\nint main() doSomething() return 0\n\nAssume that the programming language uses static scope, that variables are not explicitly declared, that the main subprogram is the first thing to be executed when the program runs, and that indentation indicates the body of subprograms. Fill in the start and end of the scope of the variable myValue, and the lifetime of the single integer value stored by the variable myValue, using the provided line numbers.\n\nScope of myValue: From up to and including Lifetime of the single integer value stored by myValue: From up to and including", "promptBlocks": ["Consider the following program code in a hypothetical programming language (line numbers are provided for reference purposes):", "void doSomething() myValue = 2 print myValue myValue = [5, 7, 9] print myValue", "int main() doSomething() return 0", "Assume that the programming language uses static scope, that variables are not explicitly declared, that the main subprogram is the first thing to be executed when the program runs, and that indentation indicates the body of subprograms. Fill in the start and end of the scope of the variable myValue, and the lifetime of the single integer value stored by the variable myValue, using the provided line numbers.", "Scope of myValue: From up to and including Lifetime of the single integer value stored by myValue: From up to and including"], "options": [], "answers": [], "reason": "", "shortAnswer": "Scope of myValue: from line 2 up to and including line 5.\nLifetime of the single integer value stored by myValue: from line 2 up to and including line 4, where the variable is rebound to the list value.", "isCodeQuestion": false}, {"number": 10, "interactive": false, "prompt": "Consider the following program code in a hypothetical programming language: void f1() { var X = 8 call f2() }\n\nvoid f2() { print(X) }\n\nvoid main() { var X = 3 call f1() } Assume that the programming language implements variable hiding and that execution starts with the main subprogram. Provide only the output of the above program code assuming the following scoping rules are used by the programming language. Provide only the numeric output (do not include additional output such as spaces or quotes) if output is successfully generated, and the text \"Error\" (without the quotes) if an error or invalid output is produced. Static scoping: Dynamic scoping:", "promptBlocks": ["Consider the following program code in a hypothetical programming language: void f1() { var X = 8 call f2() }", "void f2() { print(X) }", "void main() { var X = 3 call f1() } Assume that the programming language implements variable hiding and that execution starts with the main subprogram. Provide only the output of the above program code assuming the following scoping rules are used by the programming language. Provide only the numeric output (do not include additional output such as spaces or quotes) if output is successfully generated, and the text \"Error\" (without the quotes) if an error or invalid output is produced. Static scoping: Dynamic scoping:"], "options": [], "answers": [], "reason": "", "shortAnswer": "Static scoping: Error\nDynamic scoping: 8", "isCodeQuestion": false}, {"number": 11, "interactive": true, "prompt": "Some programming languages support complex numbers as a primitive data type. Consider the following statements, and select the one that most accurately describes an implication of such support.", "promptBlocks": ["Some programming languages support complex numbers as a primitive data type. Consider the following statements, and select the one that most accurately describes an implication of such support."], "options": ["Computations using complex number types have a somewhat high cost of execution, because these computations are not directly supported by most hardware.", "Computations using complex number types have a very low cost of execution, because these computations are directly supported by most hardware.", "Support for complex number types greatly increases the readability of a programming language.", "Support for complex number types greatly decreases the writability of a programming language."], "answers": [1], "reason": "Complex arithmetic is not directly supported by most hardware, so primitive support can still carry execution cost.", "shortAnswer": "No model answer has been added for this question yet.", "isCodeQuestion": false}, {"number": 12, "interactive": true, "prompt": "Consider the following statements, and select the one that most accurately describes a potential drawback associated with Boolean data types.", "promptBlocks": ["Consider the following statements, and select the one that most accurately describes a potential drawback associated with Boolean data types."], "options": ["Operations on Boolean data types have a high execution cost.", "Boolean data types are inefficient in terms of memory space.", "Boolean data types have low readability in most modern programming languages.", "Boolean data types are never considered to be ordinal."], "answers": [2], "reason": "Booleans may use more storage than a single bit even though their conceptual value is tiny.", "shortAnswer": "No model answer has been added for this question yet.", "isCodeQuestion": false}, {"number": 13, "interactive": true, "prompt": const quiz = document.getElementById('quiz');

function escapeHtml(value) {
  return value.replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
}

function looksLikeCode(value) {
  return /(^|\s)(:-|\?-|\[[^\]]*\]|\w+\([^)]*\)|void |int |var |class |main\(|father\(|mother\(|tenant\(|address\(|print\(|return |call )/.test(value);
}

function renderPrompt(blocks) {
  return blocks.map(block => {
    const escaped = escapeHtml(block);
    return looksLikeCode(block) ? `<pre>${escaped}</pre>` : `<p>${escaped}</p>`;
  }).join('');
}

function renderAnswer(value) {
  const escaped = escapeHtml(value);
  return /\n|:-|\?-/.test(value) ? `<pre>${escaped}</pre>` : escaped;
}

function normalizeCode(value) {
  return value.replace(/%.*$/gm, '').replace(/\s+/g, ' ').trim().toLowerCase();
}

for (const q of questions) {
  const section = document.createElement('section');
  section.className = 'question' + (q.interactive ? '' : ' coding');
  section.innerHTML = `<h2>Question ${q.number}</h2><div class="prompt">${renderPrompt(q.promptBlocks || [q.prompt])}</div>`;

  if (q.interactive) {
    const options = document.createElement('div');
    options.className = 'options';
    q.options.forEach((text, index) => {
      const button = document.createElement('button');
      button.className = 'option';
      button.type = 'button';
      button.textContent = text;
      button.addEventListener('click', () => {
        const selected = index + 1;
        const correct = q.answers.includes(selected);
        [...options.children].forEach((child, childIndex) => {
          child.disabled = true;
          if (q.answers.includes(childIndex + 1)) child.classList.add('correct');
        });
        if (!correct) button.classList.add('wrong');
        feedback.classList.add('show');
        feedback.innerHTML = `<strong>${correct ? 'Correct.' : 'Incorrect.'}</strong> Correct answer: ${q.answers.map(n => escapeHtml(q.options[n - 1])).join(' / ')}<br>${escapeHtml(q.reason)}`;
      });
      options.appendChild(button);
    });
    const feedback = document.createElement('div');
    feedback.className = 'feedback';
    section.appendChild(options);
    section.appendChild(feedback);
  } else if (q.isCodeQuestion) {
    const practice = document.createElement('div');
    practice.className = 'practice';
    const storageKey = `${document.title}-q${q.number}`;
    practice.innerHTML = `
      <div class="practice-grid">
        <div>
          <label for="answer-${q.number}">Your code</label>
          <textarea id="answer-${q.number}" spellcheck="false" placeholder="Write your Prolog answer here..."></textarea>
          <div class="button-row">
            <button class="show-answer compare" type="button">Compare</button>
            <button class="show-answer" type="button">Show answer</button>
          </div>
          <p class="compare-note">The comparison is visual. The exact-text check is only a rough guide because Prolog answers can be written in several valid ways.</p>
        </div>
        <div class="comparison">
          <h3>Model answer</h3>
          <div class="answer show">${renderAnswer(q.shortAnswer)}</div>
          <h3>Your answer</h3>
          <pre class="student-answer"></pre>
          <p class="compare-note exact-result"></p>
        </div>
      </div>`;
    const textarea = practice.querySelector('textarea');
    const compareButton = practice.querySelector('button.compare');
    const showButton = practice.querySelector('.button-row button:not(.compare)');
    const comparison = practice.querySelector('.comparison');
    const studentAnswer = practice.querySelector('.student-answer');
    const exactResult = practice.querySelector('.exact-result');
    textarea.value = localStorage.getItem(storageKey) || '';
    textarea.addEventListener('input', () => localStorage.setItem(storageKey, textarea.value));
    const showComparison = () => {
      const value = textarea.value.trim();
      studentAnswer.textContent = value || 'No answer written yet.';
      const exact = normalizeCode(value) === normalizeCode(q.shortAnswer);
      exactResult.textContent = value ? `Rough exact-text check: ${exact ? 'matches the model answer.' : 'does not exactly match; compare the logic manually.'}` : 'Write an answer first, then compare it with the model.';
      comparison.classList.add('show');
    };
    compareButton.addEventListener('click', showComparison);
    showButton.addEventListener('click', () => {
      comparison.classList.toggle('show');
      if (comparison.classList.contains('show')) showComparison();
      showButton.textContent = comparison.classList.contains('show') ? 'Hide answer' : 'Show answer';
    });
    section.appendChild(practice);
  } else {
    const button = document.createElement('button');
    button.className = 'show-answer';
    button.type = 'button';
    button.textContent = 'Show answer';
    const answer = document.createElement('div');
    answer.className = 'answer';
    answer.innerHTML = renderAnswer(q.shortAnswer);
    button.addEventListener('click', () => {
      answer.classList.toggle('show');
      button.textContent = answer.classList.contains('show') ? 'Hide answer' : 'Show answer';
    });
    section.appendChild(button);
    section.appendChild(answer);
  }

  quiz.appendChild(section);
}
