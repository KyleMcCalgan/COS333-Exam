<script>
const questions = [{"number": 1, "interactive": false, "prompt": "Assume that the following Prolog program code is provided: teachesCourse(gary). doesResearch(gary). doesResearch(thabo). academic(X) :- teachesCourse(X). academic(X) :- doesResearch(X).\n\nAlso assume that the following query is provided: ?- academic(thabo). Select from the following options to complete the following steps that are performed by Prolog from the first step to the last one, keeping in mind that Prolog performs backward chaining (also known as top-down resolution). Select \"No step performed\" for any steps you do not use. Step 1: Step 2: Step 3: Step 4:", "promptBlocks": ["Assume that the following Prolog program code is provided: teachesCourse(gary). doesResearch(gary). doesResearch(thabo). academic(X) :- teachesCourse(X). academic(X) :- doesResearch(X).", "Also assume that the following query is provided: ?- academic(thabo). Select from the following options to complete the following steps that are performed by Prolog from the first step to the last one, keeping in mind that Prolog performs backward chaining (also known as top-down resolution). Select \"No step performed\" for any steps you do not use. Step 1: Step 2: Step 3: Step 4:"], "options": [], "answers": [], "reason": "", "shortAnswer": "Step 1: Try academic(thabo) using academic(X) :- teachesCourse(X).\nStep 2: Try teachesCourse(thabo), which fails.\nStep 3: Backtrack to academic(X) :- doesResearch(X).\nStep 4: doesResearch(thabo) succeeds.", "isCodeQuestion": false}, {"number": 2, "interactive": true, "prompt": "Imagine that you have a Prolog program containing a number of facts related to animals and humans. Your program also contains rules defining a proposition named owns(X, Y), which means that a human X owns an animal Y. You then enter the following query into the Prolog system:\n\n?- owns(jack, spot).\n\nThe Prolog system responds with \"No\" (or \"False\"). One reason for this response is that the query is not true (i.e. jack is not the owner of spot). Consider the following statements, and select the one that most accurately describes another possible reason for this response.", "promptBlocks": ["Imagine that you have a Prolog program containing a number of facts related to animals and humans. Your program also contains rules defining a proposition named owns(X, Y), which means that a human X owns an animal Y. You then enter the following query into the Prolog system:", "?- owns(jack, spot).", "The Prolog system responds with \"No\" (or \"False\"). One reason for this response is that the query is not true (i.e. jack is not the owner of spot). Consider the following statements, and select the one that most accurately describes another possible reason for this response."], "options": ["Backtracking may have occurred.", "Both jack and spot do not start with uppercase letters.", "One or more rules for the owns proposition may be incorrectly implemented.", "There are no other possible interpretations. The only possible interpretation is that jack is not the owner of spot."], "answers": [3], "reason": "A false response may mean the owns rules are wrong, not only that the real-world relation is false.", "shortAnswer": "No model answer has been added for this question yet.", "isCodeQuestion": false}, {"number": 3, "interactive": false, "prompt": "Assume that you have Prolog facts describing mothers and fathers, taking the following form: father(joe, jane). father(joe, dan). father(bill, ted). father(dan, alice). mother(mary, jane). mother(mary, dan). mother(jane, ted). mother(linda, alice). Here, father(X, Y) means that X is the father of Y, and mother(X, Y) means that X is the mother of Y. Write the Prolog proposition cousin(X, Y), which succeeds if the atom X is the cousin of Y, meaning that X and Y have parents who are siblings (ie. have a brother or a sister relationship). In the above example, only ted and alice are cousins. This is because ted has jane as a parent and alice has dan as a parent, and jane and dan are siblings (because they share at least one parent in common, namely either joe or mary). No other atoms satisfy the cousin proposition in this example. Note that it is possible for same sex parents and single parents to exist in the facts, so do not rely on the fact that an individual must have both a mother and a father. Hint: When testing your proposition, use variables, such as in the query cousin(X, Y), then use Prolog\u2019s support for re-querying to determine all the pairs of atoms that satisfy the cousin proposition. Submit your program code in a file named s99999999.pl (where 99999999 is your student number) to the assignment submission slot labelled \"Semester Test 2: Simple Prolog Proposition\", and select the \"Yes\" answer below once you have done so. If you do not make a submission, select the \"No\" answer below. Take careful note of the following requirements: \uf0b7 You may not define any additional facts other than father and mother facts. If you do so, you will forfeit all marks for this question. You are required to write one or more rules that together define the cousin proposition. \uf0b7 Your submission must be working Prolog code that will be successfully interpreted by the SWI- Prolog interpreter installed on the Windows computers in the Informatorium. You may (and should) use this SWI-Prolog interpreter to test your submission. For notes on using the interpreter, and re- querying, see the specification for Practical 3. Once you have finished writing your program, save it in a text file with the appropriate name, and submit it to the correct upload slot. \uf0b7 You may define additional helper propositions. \uf0b7 Note that you may only use the simple constants, variables, list manipulation methods, arithmetic and relational expressions, and built-in predicates discussed in the textbook and slides. In particular, do not use if-then, if-then-else, and similar constructs. You may NOT use any more complex predicates provided by the Prolog system itself. In other words, you must write all your own propositions. Failure to observe this rule will result in all marks for this question being forfeited. Yes No", "promptBlocks": ["Assume that you have Prolog facts describing mothers and fathers, taking the following form: father(joe, jane). father(joe, dan). father(bill, ted). father(dan, alice). mother(mary, jane). mother(mary, dan). mother(jane, ted). mother(linda, alice). Here, father(X, Y) means that X is the father of Y, and mother(X, Y) means that X is the mother of Y. Write the Prolog proposition cousin(X, Y), which succeeds if the atom X is the cousin of Y, meaning that X and Y have parents who are siblings (ie. have a brother or a sister relationship). In the above example, only ted and alice are cousins. This is because ted has jane as a parent and alice has dan as a parent, and jane and dan are siblings (because they share at least one parent in common, namely either joe or mary). No other atoms satisfy the cousin proposition in this example. Note that it is possible for same sex parents and single parents to exist in the facts, so do not rely on the fact that an individual must have both a mother and a father. Hint: When testing your proposition, use variables, such as in the query cousin(X, Y), then use Prolog\u2019s support for re-querying to determine all the pairs of atoms that satisfy the cousin proposition. Submit your program code in a file named s99999999.pl (where 99999999 is your student number) to the assignment submission slot labelled \"Semester Test 2: Simple Prolog Proposition\", and select the \"Yes\" answer below once you have done so. If you do not make a submission, select the \"No\" answer below. Take careful note of the following requirements: \uf0b7 You may not define any additional facts other than father and mother facts. If you do so, you will forfeit all marks for this question. You are required to write one or more rules that together define the cousin proposition. \uf0b7 Your submission must be working Prolog code that will be successfully interpreted by the SWI- Prolog interpreter installed on the Windows computers in the Informatorium. You may (and should) use this SWI-Prolog interpreter to test your submission. For notes on using the interpreter, and re- querying, see the specification for Practical 3. Once you have finished writing your program, save it in a text file with the appropriate name, and submit it to the correct upload slot. \uf0b7 You may define additional helper propositions. \uf0b7 Note that you may only use the simple constants, variables, list manipulation methods, arithmetic and relational expressions, and built-in predicates discussed in the textbook and slides. In particular, do not use if-then, if-then-else, and similar constructs. You may NOT use any more complex predicates provided by the Prolog system itself. In other words, you must write all your own propositions. Failure to observe this rule will result in all marks for this question being forfeited. Yes No"], "options": [], "answers": [], "reason": "", "shortAnswer": "parent(X, Y) :- father(X, Y).\nparent(X, Y) :- mother(X, Y).\n\nsibling(X, Y) :- parent(P, X), parent(P, Y), not(X = Y).\n\ncousin(X, Y) :- parent(P1, X), parent(P2, Y), sibling(P1, P2), not(X = Y).", "isCodeQuestion": true}, {"number": 4, "interactive": false, "prompt": "Write a Prolog proposition called sumNonNegativeValues(L, X), which succeeds if X is an integer value representing the sum of all the non-negative values (including zeros) contained in the list L. You may assume that the list L contains only integer values. For example, the query:\n\n?- sumNonNegativeValues([-1, -2, -3, -5], X).\n\nshould be true with the instantiation X = 0. This is because there are no non-negative values in the list [-1, -2, -3, -5]. Similarly, the query\n\n?- sumNonNegativeValues([2, -2, 3, -5], X).\n\nshould be true with the instantiation X = 5. This is because 2 and 3 are the only non-negative values in the list [2, -2, 3, -5], and . Hints: You can use comparison operators as terms in Prolog. These operators are similar to what you are used to in imperative languages. The operators < (less than), =< (less than or equal to), > (greater than), and >= (greater than or equal to) are all valid. As a very simple example, you could use a comparison operator as follows:\n\nlessThan(X, Y) :- X < Y.\n\nThe following queries are then possible:\n\n?- lessThan(1, 2). true.\n\n?- lessThan(2, 1). false. Consider using Prolog's support for simple arithmetic. Submit your program code in a file named s99999999.pl (where 99999999 is your student number) to the assignment submission slot labelled \"Semester Test 2: List Processing Prolog Proposition\", and select the \"Yes\" answer below once you have done so. If you do not make a submission, select the \"No\" answer below. Take careful note of the following requirements: \uf0b7 Your submission must be working Prolog code that will be successfully interpreted by the SWI- Prolog interpreter installed on the Windows computers in the Informatorium. You may (and should) use this SWI-Prolog interpreter to test your submission. For notes on using the interpreter, and re- querying, see the specification for Practical 3. Once you have finished writing your program, save it in a text file with the appropriate name, and submit it to the correct upload slot. \uf0b7 You may define additional helper propositions. \uf0b7 Note that you may only use the simple constants, variables, list manipulation methods, arithmetic and relational expressions, and built-in predicates discussed in the textbook and slides. In particular, do not use if-then, if-then-else, and similar constructs. You may NOT use any more complex predicates provided by the Prolog system itself. In other words, you must write all your own propositions. Failure to observe this rule will result in all marks for this question being forfeited. Yes No", "promptBlocks": ["Write a Prolog proposition called sumNonNegativeValues(L, X), which succeeds if X is an integer value representing the sum of all the non-negative values (including zeros) contained in the list L. You may assume that the list L contains only integer values. For example, the query:", "?- sumNonNegativeValues([-1, -2, -3, -5], X).", "should be true with the instantiation X = 0. This is because there are no non-negative values in the list [-1, -2, -3, -5]. Similarly, the query", "?- sumNonNegativeValues([2, -2, 3, -5], X).", "should be true with the instantiation X = 5. This is because 2 and 3 are the only non-negative values in the list [2, -2, 3, -5], and . Hints: You can use comparison operators as terms in Prolog. These operators are similar to what you are used to in imperative languages. The operators < (less than), =< (less than or equal to), > (greater than), and >= (greater than or equal to) are all valid. As a very simple example, you could use a comparison operator as follows:", "lessThan(X, Y) :- X < Y.", "The following queries are then possible:", "?- lessThan(1, 2). true.", "?- lessThan(2, 1). false. Consider using Prolog's support for simple arithmetic. Submit your program code in a file named s99999999.pl (where 99999999 is your student number) to the assignment submission slot labelled \"Semester Test 2: List Processing Prolog Proposition\", and select the \"Yes\" answer below once you have done so. If you do not make a submission, select the \"No\" answer below. Take careful note of the following requirements: \uf0b7 Your submission must be working Prolog code that will be successfully interpreted by the SWI- Prolog interpreter installed on the Windows computers in the Informatorium. You may (and should) use this SWI-Prolog interpreter to test your submission. For notes on using the interpreter, and re- querying, see the specification for Practical 3. Once you have finished writing your program, save it in a text file with the appropriate name, and submit it to the correct upload slot. \uf0b7 You may define additional helper propositions. \uf0b7 Note that you may only use the simple constants, variables, list manipulation methods, arithmetic and relational expressions, and built-in predicates discussed in the textbook and slides. In particular, do not use if-then, if-then-else, and similar constructs. You may NOT use any more complex predicates provided by the Prolog system itself. In other words, you must write all your own propositions. Failure to observe this rule will result in all marks for this question being forfeited. Yes No"], "options": [], "answers": [], "reason": "", "shortAnswer": "sumNonNegativeValues([], 0).\nsumNonNegativeValues([H|T], X) :- H >= 0, sumNonNegativeValues(T, R), X is H + R.\nsumNonNegativeValues([H|T], X) :- H < 0, sumNonNegativeValues(T, X).", "isCodeQuestion": true}, {"number": 5, "interactive": true, "prompt": "Consider how C99 handles name length, in comparison to Java. Consider the following statements, and select the one that is the most correct.", "promptBlocks": ["Consider how C99 handles name length, in comparison to Java. Consider the following statements, and select the one that is the most correct."], "options": ["C99 has a more readable and more writable approach than Java.", "C99 has a less readable and less writable approach than Java.", "C99 has a more readable and less writable approach than Java.", "C99 has a less readable and more writable approach than Java."], "answers": [2], "reason": "C99 has significant identifier-length limits compared with Java, hurting both readability and writability.", "shortAnswer": "No model answer has been added for this question yet.", "isCodeQuestion": false}, {"number": 6, "interactive": true, "prompt": "Perl and PHP both use special characters in names. Consider the following statements, and select the one that is the most correct.", "promptBlocks": ["Perl and PHP both use special characters in names. Consider the following statements, and select the one that is the most correct."], "options": ["Perl's use of special characters makes it less writable than PHP.", "Perl and PHP's use of special characters both reduce the cost of compilation.", "Perl's use of special characters makes it more readable than PHP.", "Perl's use of special characters makes it less readable than PHP."], "answers": [3], "reason": "Perl's different sigils can communicate the kind of variable, improving readability compared with PHP's uniform dollar sign.", "shortAnswer": "No model answer has been added for this question yet.", "isCodeQuestion": false}, {"number": 7, "interactive": false, "prompt": "Consider the following program code in a hypothetical programming language: void f() { static integer myValue = 5 myValue = myValue + 1 print(myValue) integer static = 10 print(static) } In this code, any variable definition with integer in front of the variable name stores integer values. Any variable definition with static in front of the variable type is a static local variable, with the same semantics as a static local variable in C. Identify the type of special word that static is in the provided program code.", "promptBlocks": ["Consider the following program code in a hypothetical programming language: void f() { static integer myValue = 5 myValue = myValue + 1 print(myValue) integer static = 10 print(static) } In this code, any variable definition with integer in front of the variable name stores integer values. Any variable definition with static in front of the variable type is a static local variable, with the same semantics as a static local variable in C. Identify the type of special word that static is in the provided program code."], "options": [], "answers": [], "reason": "", "shortAnswer": "static is a keyword/reserved word in this language because it has a special grammatical role before the type.", "isCodeQuestion": false}, {"number": 8, "interactive": true, "prompt": "Consider the following options, and select the time at which a variable is bound to a type in Python.", "promptBlocks": ["Consider the following options, and select the time at which a variable is bound to a type in Python."], "options": ["Language design time.", "Language implementation time.", "Compile time.", "Load time.", "Runtime."], "answers": [5], "reason": "Python binds a variable to a type at runtime when a value is assigned.", "shortAnswer": "No model answer has been added for this question yet.", "isCodeQuestion": false}, {"number": 9, "interactive": true, "prompt": "Consider the following program code in a hypothetical programming language: myVariable1 = [1, 2, 3] myVariable2 = 14 Consider the following options, and select only the kind or kinds of type binding that could be used for both myVariable1 and myVariable2. Note that incorrectly selected options will be penalised.", "promptBlocks": ["Consider the following program code in a hypothetical programming language: myVariable1 = [1, 2, 3] myVariable2 = 14 Consider the following options, and select only the kind or kinds of type binding that could be used for both myVariable1 and myVariable2. Note that incorrectly selected options will be penalised."], "options": ["Explicit type declaration.", "Implicit type declaration without type inferencing.", "Implicit type declaration with type inferencing.", "Dynamic type binding."], "answers": [3, 4], "reason": "Both inferred static binding and dynamic type binding can type variables from assignment without explicit declarations.", "shortAnswer": "No model answer has been added for this question yet.", "isCodeQuestion": false}, {"number": 10, "interactive": false, "prompt": "Consider the following program code in a hypothetical programming language (line numbers are provided only for reference purposes): void f() size = 2 allocate(newArray, size) newArray[0] = 25 newArray[1] = 10 print(newArray[1]) int main() f() return 0 Assume that the programming language uses static scope, that variables are not explicitly declared, that the main subprogram is the first thing to be executed when the program runs, and that indentation indicates the body of subprograms. Fill in the start and end of the scope and lifetime of the variable newArray. Scope of newArray: From up to and including Lifetime of newArray: From up to and including", "promptBlocks": ["Consider the following program code in a hypothetical programming language (line numbers are provided only for reference purposes): void f() size = 2 allocate(newArray, size) newArray[0] = 25 newArray[1] = 10 print(newArray[1]) int main() f() return 0 Assume that the programming language uses static scope, that variables are not explicitly declared, that the main subprogram is the first thing to be executed when the program runs, and that indentation indicates the body of subprograms. Fill in the start and end of the scope and lifetime of the variable newArray. Scope of newArray: From up to and including Lifetime of newArray: From up to and including"], "options": [], "answers": [], "reason": "", "shortAnswer": "Scope of newArray: from line 3 up to and including line 6.\nLifetime of newArray: from line 3 up to and including the point where the allocated heap storage is deallocated. No deallocation is shown, so it outlives f and becomes leaked/inaccessible after f returns.", "isCodeQuestion": false}, {"number": 11, "interactive": false, "prompt": "Consider the following program code in a hypothetical programming language: X = 5\n\nvoid main() {\n\nvar X = 12\n\nvoid sub1() { print(X) }\n\nvoid sub2() { var X = 41 call sub1() }\n\ncall sub2() } Assume that the programming language implements variable hiding, that nested subprograms are supported, and that execution starts with the main subprogram. Provide only the numeric output (do not include additional output such as spaces or quotes) of the above program code assuming the following scoping rules are used by the programming language: Static scoping: Dynamic scoping:", "promptBlocks": ["Consider the following program code in a hypothetical programming language: X = 5", "void main() {", "var X = 12", "void sub1() { print(X) }", "void sub2() { var X = 41 call sub1() }", "call sub2() } Assume that the programming language implements variable hiding, that nested subprograms are supported, and that execution starts with the main subprogram. Provide only the numeric output (do not include additional output such as spaces or quotes) of the above program code assuming the following scoping rules are used by the programming language: Static scoping: Dynamic scoping:"], "options": [], "answers": [], "reason": "", "shortAnswer": "Static scoping: 12\nDynamic scoping: 41", "isCodeQuestion": false}, {"number": 12, "interactive": true, "prompt": "There are two main disadvantages associated with decimal data types, which are not associated with floating point data types. Firstly, decimal types waste more memory than floating point types. Secondly, decimal types have a more limited range than floating point types. Consider the following statements, and select the one that most correctly describes another drawback associated with decimal types, which are not associated with floating point data types.", "promptBlocks": ["There are two main disadvantages associated with decimal data types, which are not associated with floating point data types. Firstly, decimal types waste more memory than floating point types. Secondly, decimal types have a more limited range than floating point types. Consider the following statements, and select the one that most correctly describes another drawback associated with decimal types, which are not associated with floating point data types."], "options": ["Operations on decimal types have a higher cost of execution than operations on floating point types, on most modern computers.", "Decimal types are less reliable than floating point types.", "Decimal types are less accurate than floating point types.", "Decimal types are less readable than floating point types."], "answers": [1], "reason": "Decimal arithmetic is usually implemented with more work than binary floating-point arithmetic on modern hardware.", "shortAnswer": "No model answer has been added for this question yet.", "isCodeQuestion": false}, {"number": 13, "interactive": true, "prompt": "Two possible character type representations are ASCII and Unicode. Consider the following statements, and select the one that that most correctly describes an advantage that ASCII has over Unicode.", "promptBlocks": ["Two possible character type representations are ASCII and Unicode. Consider the following statements, and select the one that that most correctly describes an advantage that ASCII has over Unicode."], "options": ["ASCII is more reliable than Unicode.", "ASCII is more writable than Unicode.", "ASCII is more memory efficient than Unicode.", "ASCII can represent characters that Unicode cannot represent."], "answers": [3], "reason": "ASCII needs fewer bits per character than Unicode.", "shortAnswer": "No model answer has been added for this question yet.", "isCodeQuestion": false}, {"number": 14, "interactive": true, "prompt": "Strings are supported in C and Java. Consider the following statements, and select the one that is the most correct.", "promptBlocks": ["Strings are supported in C and Java. Consider the following statements, and select the one that is the most correct."], "options": ["Strings in C are more readable than strings in Java.", "Strings in C are more writable in terms of string length than strings in Java.", "Strings in C are more reliable than strings in Java.", "Strings in C have a higher cost of execution than strings in Java."], "answers": [2], "reason": "C strings can vary within character arrays, while Java String objects are immutable once created.", "shortAnswer": "No model answer has been added for this question yet.", "isCodeQuestion": false}, {"number": 15, "interactive": tr const quiz = document.getElementById('quiz');

function escapeHtml(value) {
  return value.replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
}

function looksLikeCode(value) {
  return /(^|\s)(:-|\?-|\[[^\]]*\]|\w+\([^)]*\)|void |int |var |class |main\(|father\(|mother\(|tenant\(|address\(|print\(|return |call )/.test(value);
}

function renderPrompt(blocks) {
  return blocks.map(block => {
    const escaped = escapeHtml(block);
    return looksLikeCode(block) ? `<pre>${escaped}</pre>` : `<p>${escaped}</p>`;
  }).join('');
}

function renderAnswer(value) {
  const escaped = escapeHtml(value);
  return /\n|:-|\?-/.test(value) ? `<pre>${escaped}</pre>` : escaped;
}

function normalizeCode(value) {
  return value.replace(/%.*$/gm, '').replace(/\s+/g, ' ').trim().toLowerCase();
}

for (const q of questions) {
  const section = document.createElement('section');
  section.className = 'question' + (q.interactive ? '' : ' coding');
  section.innerHTML = `<h2>Question ${q.number}</h2><div class="prompt">${renderPrompt(q.promptBlocks || [q.prompt])}</div>`;

  if (q.interactive) {
    const options = document.createElement('div');
    options.className = 'options';
    q.options.forEach((text, index) => {
      const button = document.createElement('button');
      button.className = 'option';
      button.type = 'button';
      button.textContent = text;
      button.addEventListener('click', () => {
        const selected = index + 1;
        const correct = q.answers.includes(selected);
        [...options.children].forEach((child, childIndex) => {
          child.disabled = true;
          if (q.answers.includes(childIndex + 1)) child.classList.add('correct');
        });
        if (!correct) button.classList.add('wrong');
        feedback.classList.add('show');
        feedback.innerHTML = `<strong>${correct ? 'Correct.' : 'Incorrect.'}</strong> Correct answer: ${q.answers.map(n => escapeHtml(q.options[n - 1])).join(' / ')}<br>${escapeHtml(q.reason)}`;
      });
      options.appendChild(button);
    });
    const feedback = document.createElement('div');
    feedback.className = 'feedback';
    section.appendChild(options);
    section.appendChild(feedback);
  } else if (q.isCodeQuestion) {
    const practice = document.createElement('div');
    practice.className = 'practice';
    const storageKey = `${document.title}-q${q.number}`;
    practice.innerHTML = `
      <div class="practice-grid">
        <div>
          <label for="answer-${q.number}">Your code</label>
          <textarea id="answer-${q.number}" spellcheck="false" placeholder="Write your Prolog answer here..."></textarea>
          <div class="button-row">
            <button class="show-answer compare" type="button">Compare</button>
            <button class="show-answer" type="button">Show answer</button>
          </div>
          <p class="compare-note">The comparison is visual. The exact-text check is only a rough guide because Prolog answers can be written in several valid ways.</p>
        </div>
        <div class="comparison">
          <h3>Model answer</h3>
          <div class="answer show">${renderAnswer(q.shortAnswer)}</div>
          <h3>Your answer</h3>
          <pre class="student-answer"></pre>
          <p class="compare-note exact-result"></p>
        </div>
      </div>`;
    const textarea = practice.querySelector('textarea');
    const compareButton = practice.querySelector('button.compare');
    const showButton = practice.querySelector('.button-row button:not(.compare)');
    const comparison = practice.querySelector('.comparison');
    const studentAnswer = practice.querySelector('.student-answer');
    const exactResult = practice.querySelector('.exact-result');
    textarea.value = localStorage.getItem(storageKey) || '';
    textarea.addEventListener('input', () => localStorage.setItem(storageKey, textarea.value));
    const showComparison = () => {
      const value = textarea.value.trim();
      studentAnswer.textContent = value || 'No answer written yet.';
      const exact = normalizeCode(value) === normalizeCode(q.shortAnswer);
      exactResult.textContent = value ? `Rough exact-text check: ${exact ? 'matches the model answer.' : 'does not exactly match; compare the logic manually.'}` : 'Write an answer first, then compare it with the model.';
      comparison.classList.add('show');
    };
    compareButton.addEventListener('click', showComparison);
    showButton.addEventListener('click', () => {
      comparison.classList.toggle('show');
      if (comparison.classList.contains('show')) showComparison();
      showButton.textContent = comparison.classList.contains('show') ? 'Hide answer' : 'Show answer';
    });
    section.appendChild(practice);
  } else {
    const button = document.createElement('button');
    button.className = 'show-answer';
    button.type = 'button';
    button.textContent = 'Show answer';
    const answer = document.createElement('div');
    answer.className = 'answer';
    answer.innerHTML = renderAnswer(q.shortAnswer);
    button.addEventListener('click', () => {
      answer.classList.toggle('show');
      button.textContent = answer.classList.contains('show') ? 'Hide answer' : 'Show answer';
    });
    section.appendChild(button);
    section.appendChild(answer);
  }

  quiz.appendChild(section);
}
